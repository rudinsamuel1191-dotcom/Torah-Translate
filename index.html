<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoTorah | Holy Language Translator</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #334155;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.8rem;
            color: var(--primary);
            margin: 0;
            font-weight: 800;
            letter-spacing: -1.5px;
        }

        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-top: 8px;
        }

        /* Search Section */
        .search-area {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 280px;
            padding: 16px 20px;
            font-size: 1.25rem;
            border: 2px solid var(--border);
            border-radius: 14px;
            outline: none;
            transition: all 0.2s;
            direction: rtl; /* Hebrew friendly */
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        button:hover { background: #0f172a; }
        button:active { transform: scale(0.98); }

        /* Results Styling */
        #results { display: none; }

        .section-header {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            margin: 40px 0 20px 5px;
            display: flex;
            align-items: center;
        }

        .section-header::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
            margin-left: 15px;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .dict-badge {
            display: inline-block;
            background: #eff6ff;
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .word-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .source-card {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .source-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .ref-tag {
            font-weight: 800;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
        }

        .snippet {
            display: block;
            margin-top: 10px;
            font-size: 1.15rem;
            color: #475569;
            direction: rtl;
        }

        #status {
            text-align: center;
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 15px;
        }

        .loading-text { text-align: center; padding: 40px; color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>LingoTorah</h1>
        <p class="subtitle">Deep Translation & Torah Source Finder</p>
    </header>

    <div class="search-area">
        <div class="input-group">
            <input type="text" id="wordInput" placeholder="Type Hebrew/Aramaic word or sentence..." autocomplete="off">
            <button onclick="handleSearch()">Search</button>
        </div>
        <div id="status"></div>
    </div>

    <div id="results">
        <div class="section-header">Dictionary & Lexicon</div>
        <div id="dictOutput"></div>

        <div class="section-header">Biblical & Talmudic Sources</div>
        <div id="sourceOutput"></div>
    </div>
</div>

<script>
    const wordInput = document.getElementById('wordInput');
    const status = document.getElementById('status');
    const resultsArea = document.getElementById('results');
    const dictOutput = document.getElementById('dictOutput');
    const sourceOutput = document.getElementById('sourceOutput');

    // Enter key support
    wordInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSearch(); });

    async function handleSearch() {
        const query = wordInput.value.trim();
        if (!query) return;

        status.innerText = "Searching the archives...";
        resultsArea.style.display = "block";
        dictOutput.innerHTML = '<div class="loading-text">Consulting Jastrow & Lexicons...</div>';
        sourceOutput.innerHTML = '<div class="loading-text">Searching Torah & Talmud...</div>';

        try {
            // We run both searches at the same time for speed
            await Promise.all([
                fetchDictionary(query),
                fetchSources(query)
            ]);
            status.innerText = "";
        } catch (e) {
            status.innerText = "Connection error. Please try again.";
        }
    }

    async function fetchDictionary(word) {
        // If it's a sentence, we look up the first word for the dictionary portion
        const lookupWord = word.split(/\s+/)[0].replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        
        try {
            const res = await fetch(`https://www.sefaria.org/api/words/${encodeURIComponent(lookupWord)}`);
            const data = await res.json();
            
            if (!data || data.length === 0) {
                dictOutput.innerHTML = "<div class='card'>No direct dictionary entry found. Try searching for the root word.</div>";
                return;
            }

            dictOutput.innerHTML = data.map(entry => {
                // FIXED LOGIC: Robust parsing for different Sefaria dictionary formats
                let definition = "";
                
                if (typeof entry.content === 'string') {
                    definition = entry.content;
                } else if (entry.content?.definition) {
                    definition = entry.content.definition;
                } else if (entry.content?.senses) {
                    // Collect all definition senses
                    definition = entry.content.senses.map(s => s.definition || "").join("; ");
                } else if (entry.content?.sense?.definition) {
                    definition = entry.content.sense.definition;
                }

                // If still empty, show a fallback
                if (!definition || definition === "undefined") {
                    definition = "View full entry in Sefaria Lexicon.";
                }

                return `
                    <div class="card">
                        <span class="dict-badge">${entry.lexicon_name || 'Lexicon'}</span>
                        <div class="word-title">${entry.headword}</div>
                        <div style="color: #334155;">${definition}</div>
                    </div>
                `;
            }).join('');
        } catch (e) {
            dictOutput.innerHTML = "Error loading dictionary.";
        }
    }

    async function fetchSources(query) {
        try {
            const res = await fetch('https://www.sefaria.org/api/search-wrapper', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query: query,
                    type: "text",
                    size: 8
                })
            });
            const data = await res.json();

            if (!data.hits?.hits?.length) {
                sourceOutput.innerHTML = "<div class='card'>No sources found in the library.</div>";
                return;
            }

            sourceOutput.innerHTML = data.hits.hits.map(hit => {
                const ref = hit._source.ref;
                const url = `https://www.sefaria.org/${ref.replace(/ /g, "_")}`;
                
                // Use highlighted text if available, otherwise fallback to plain text
                const snippet = hit.highlight?.exact?.join(' ... ') || hit._source.text || "Click to read full text";

                return `
                    <a href="${url}" target="_blank" class="card source-card">
                        <div class="ref-tag">
                            <span>${ref}</span>
                            <span style="font-size: 0.7rem; opacity: 0.6;">READ ON SEFARIA ↗</span>
                        </div>
                        <span class="snippet">${snippet}</span>
                    </a>
                `;
            }).join('');
        } catch (e) {
            sourceOutput.innerHTML = "Error loading sources.";
        }
    }
</script>

</body>
</html>
