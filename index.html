<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torah Lens: Advanced Translator</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: var(--primary); text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 1.1rem; direction: rtl; box-sizing: border-box; resize: vertical; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button, .upload-label { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .upload-label { background: var(--accent); }
        input[type="file"] { display: none; }
        #status { font-size: 0.9rem; color: #666; margin-top: 10px; text-align: center; }
        .results-box { display: none; }
        .result-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .result-item:last-child { border: none; }
        .tag { font-size: 0.7rem; text-transform: uppercase; background: #eee; padding: 2px 6px; border-radius: 4px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Torah Lens</h1>
        <textarea id="inputText" rows="3" placeholder="Type or scan text..."></textarea>
        
        <div id="status">Ready</div>

        <div class="btn-group">
            <label class="upload-label">
                📷 Scan Page
                <input type="file" accept="image/*" capture="environment" onchange="ocrProcess(this)">
            </label>
            <button onclick="handleTranslate()">Translate All</button>
        </div>
        <button style="width:100%; margin-top:10px; background:#27ae60;" onclick="handleSefariaLookup()">Dictionary & Sources</button>
    </div>

    <div id="results" class="card results-box">
        <div id="outputContent"></div>
    </div>
</div>

<script>
    const status = document.getElementById('status');
    const inputText = document.getElementById('inputText');
    const results = document.getElementById('results');
    const output = document.getElementById('outputContent');

    // 1. IMPROVED OCR LOGIC
    async function ocrProcess(input) {
        if (!input.files[0]) return;
        status.innerText = "⏳ Processing Image... (This takes 10-20 seconds)";
        
        try {
            const worker = await Tesseract.createWorker('heb');
            const { data: { text } } = await worker.recognize(input.files[0]);
            await worker.terminate();
            
            inputText.value = text;
            status.innerText = "✅ Scan Complete!";
        } catch (e) {
            status.innerText = "❌ Error: Try a clearer photo";
            console.error(e);
        }
    }

    // 2. SENTENCE TRANSLATION (Uses a Free Google Translate Proxy)
    async function handleTranslate() {
        const text = inputText.value.trim();
        if (!text) return;
        
        status.innerText = "🌐 Translating Sentence...";
        results.style.display = 'block';
        output.innerHTML = "Translating...";

        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=iw&tl=en&dt=t&q=${encodeURI(text)}`);
            const data = await res.json();
            const translatedText = data[0].map(x => x[0]).join(' ');
            
            output.innerHTML = `<div><strong>English Translation:</strong><p>${translatedText}</p></div>`;
            status.innerText = "Done!";
        } catch (e) {
            output.innerHTML = "Error connecting to translation engine.";
        }
    }

    // 3. SEFARIA LOOKUP (Dictionary & Sources)
    async function handleSefariaLookup() {
        const text = inputText.value.trim();
        if (!text) return;

        // If it's a sentence, we just look up the first word for the dictionary
        const word = text.split(/\s+/)[0].replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        
        status.innerText = "📚 Searching Sefaria...";
        results.style.display = 'block';
        output.innerHTML = "Fetching Dictionary & Sources...";

        try {
            // Get Dictionary
            const dictRes = await fetch(`https://www.sefaria.org/api/words/${encodeURIComponent(word)}`);
            const dictData = await dictRes.json();
            
            // Get Sources
            const sourceRes = await fetch('https://www.sefaria.org/api/search-wrapper', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: word, type: "text", size: 3 })
            });
            const sourceData = await sourceRes.json();

            let html = `<h4>Dictionary: ${word}</h4>`;
            if (dictData.length > 0) {
                dictData.slice(0, 2).forEach(e => {
                    html += `<div class="result-item"><span class="tag">${e.lexicon_name}</span><br>${e.content.definition || 'See entry'}</div>`;
                });
            } else {
                html += "<p>No exact dictionary match.</p>";
            }

            html += `<h4>Top Sources</h4>`;
            if (sourceData.hits.hits.length > 0) {
                sourceData.hits.hits.forEach(h => {
                    html += `<div class="result-item"><strong>${h._source.ref}</strong><br><small>${h._source.text}</small></div>`;
                });
            } else {
                html += "<p>No sources found.</p>";
            }

            output.innerHTML = html;
            status.innerText = "Results updated!";
        } catch (e) {
            output.innerHTML = "Error fetching Sefaria data.";
        }
    }
</script>
</body>
</html>
