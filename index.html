<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoTorah | Hebrew & Aramaic Lexicon</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 700px; margin-top: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.2rem; color: var(--primary); margin: 0; letter-spacing: -1px; }
        p.subtitle { color: #64748b; margin-top: 5px; }
        .search-card { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .input-wrapper { display: flex; gap: 10px; flex-wrap: wrap; }
        input[type="text"] { flex: 1; min-width: 200px; padding: 15px; font-size: 1.2rem; border: 2px solid var(--border); border-radius: 12px; outline: none; direction: rtl; }
        input[type="text"]:focus { border-color: var(--accent); }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1a252f; }
        #results { margin-top: 30px; display: none; }
        .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 15px; display: block; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .dict-entry { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .dict-name { font-weight: bold; color: var(--accent); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; }
        .source-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .source-link { text-decoration: none; color: var(--primary); font-weight: 700; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .source-text { display: block; margin-top: 8px; font-size: 1.1rem; color: #475569; direction: rtl; line-height: 1.6; }
        .loading { text-align: center; padding: 20px; color: #64748b; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>LingoTorah</h1>
        <p class="subtitle">Search the Written & Oral Torah</p>
    </header>

    <div class="search-card">
        <div class="input-wrapper">
            <input type="text" id="wordInput" placeholder="...הקלד מילה" autocomplete="off">
            <button onclick="handleSearch()">Search</button>
        </div>
        <div id="status" style="margin-top: 12px; font-size: 0.85rem; color: #64748b; text-align: center;"></div>
    </div>

    <div id="results">
        <span class="section-title">Dictionary Results</span>
        <div id="dictOutput"></div>

        <span class="section-title" style="margin-top: 30px;">Textual Sources</span>
        <div id="sourceOutput"></div>
    </div>
</div>

<script>
    const wordInput = document.getElementById('wordInput');
    const status = document.getElementById('status');
    const resultsArea = document.getElementById('results');
    const dictOutput = document.getElementById('dictOutput');
    const sourceOutput = document.getElementById('sourceOutput');

    wordInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSearch(); });

    async function handleSearch() {
        const query = wordInput.value.trim();
        if (!query) return;

        status.innerText = "Searching...";
        resultsArea.style.display = "block";
        dictOutput.innerHTML = '<div class="loading">Fetching definitions...</div>';
        sourceOutput.innerHTML = '<div class="loading">Locating sources...</div>';

        try {
            await Promise.all([fetchDictionary(query), fetchSources(query)]);
            status.innerText = "";
        } catch (e) {
            status.innerText = "Connection error. Try again.";
        }
    }

    async function fetchDictionary(word) {
        try {
            const res = await fetch(`https://www.sefaria.org/api/words/${encodeURIComponent(word)}`);
            const data = await res.json();
            
            if (!data || data.length === 0) {
                dictOutput.innerHTML = "<p>No entries found.</p>";
                return;
            }

            dictOutput.innerHTML = data.map(entry => {
                // Dig for definition text
                let definition = "No definition available.";
                if (typeof entry.content === 'string') {
                    definition = entry.content;
                } else if (entry.content?.definition) {
                    definition = entry.content.definition;
                } else if (entry.content?.senses?.[0]?.definition) {
                    definition = entry.content.senses[0].definition;
                } else if (entry.content?.bases?.[0]) {
                    definition = `Related to: ${entry.content.bases[0]}`;
                }

                return `
                    <div class="dict-entry">
                        <div class="dict-name">${entry.lexicon_name || 'Lexicon'}</div>
                        <div style="font-size: 1.3rem; margin-bottom: 8px;"><strong>${entry.headword}</strong></div>
                        <div style="line-height: 1.5; color: #334155;">${definition}</div>
                    </div>
                `;
            }).join('');
        } catch (e) { dictOutput.innerHTML = "Error loading dictionary."; }
    }

    async function fetchSources(word) {
        try {
            const res = await fetch('https://www.sefaria.org/api/search-wrapper', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: word, type: "text", size: 6 })
            });
            const data = await res.json();

            if (!data.hits?.hits?.length) {
                sourceOutput.innerHTML = "<p>No textual matches found.</p>";
                return;
            }

            sourceOutput.innerHTML = data.hits.hits.map(hit => {
                const ref = hit._source.ref;
                const url = `https://www.sefaria.org/${ref.replace(/ /g, "_")}`;
                const snippet = hit.highlight?.exact?.join(' ... ') || hit._source.text || "View full text";

                return `
                    <div class="source-card">
                        <a href="${url}" target="_blank" class="source-link">
                            <span>${ref}</span>
                            <span style="color: var(--accent);">VIEW ↗</span>
                        </a>
                        <span class="source-text">${snippet}</span>
                    </div>
                `;
            }).join('');
        } catch (e) { sourceOutput.innerHTML = "Error loading sources."; }
    }
</script>
</body>
</html>
